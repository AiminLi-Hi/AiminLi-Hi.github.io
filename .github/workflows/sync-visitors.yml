name: Sync visitor data

on:
  # Manual only. Visitor snapshots should not be refreshed by a scheduled job.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: homepage-data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync visitor data
        run: npm run sync:visitors
        env:
          VITE_VISITOR_STATS_ENDPOINT: https://aimin-homepage-visitors-api.pages.dev

      - name: Validate app
        run: |
          npm run lint
          npm run build
        env:
          VITE_VISITOR_STATS_ENDPOINT: https://aimin-homepage-visitors-api.pages.dev

      - name: Commit synchronized visitor data
        id: commit-data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/homepage-sync-data.js public/visitor-map-data.js
          if git diff --cached --quiet; then
            echo "No synchronized visitor data changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Sync homepage visitor data"
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy GitHub Pages
        if: steps.commit-data.outputs.changed == 'true'
        run: npm run deploy:pages
        env:
          VITE_VISITOR_STATS_ENDPOINT: https://aimin-homepage-visitors-api.pages.dev
          GIT_AUTHOR_NAME: github-actions-bot
          GIT_AUTHOR_EMAIL: github-actions-bot@users.noreply.github.com
